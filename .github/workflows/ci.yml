name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install poethepoet ruff pyright

      - name: Lint
        run: poe lint

      - name: Format check
        run: poe format-check

      - name: Type check
        run: poe type

      - name: Tests
        run: poe test
