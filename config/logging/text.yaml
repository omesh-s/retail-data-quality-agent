# Alias style: human-readable logs (same idea as console.yaml).
version: 1
disable_existing_loggers: false
formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%dT%H:%M:%S"
handlers:
  stderr:
    class: logging.StreamHandler
    formatter: standard
    stream: ext://sys.stderr
root:
  level: DEBUG
  handlers: [stderr]
